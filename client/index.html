<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- <link rel="stylesheet" href="./styles/main.css" /> -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
			rel="stylesheet"
		/>
		<title>My WorkOut App</title>
	</head>
	<body>
		<div class="wrapper">
			<header class="header">
				<div class="header__container container">
					<sidebar class="movement-widget">
						<button class="movement-widget__control" id="btnToggleSidebar">
							<span class="movement-widget__control--icon">
								<img src="./img/right-arrow.png" alt="arrow icon" />
							</span>
						</button>
						<ul class="movements-list">
							<li class="movements-list__item">
								<button
									type="button"
									class="movements-list__btn is-active"
									data-activity="pullUp"
								>
									<span class="movements-list__title">Pull ups</span>
									<span class="movements-list__icon">
										<img src="./img/pull-up-icon.svg" alt="pull up" />
									</span>
								</button>
							</li>
							<li class="movements-list__item">
								<button
									type="button"
									class="movements-list__btn"
									data-activity="pushUp"
								>
									<span class="movements-list__title">Push ups</span>
									<span class="movements-list__icon">
										<img src="./img/push-up-icon.svg" alt="push up" />
									</span>
								</button>
							</li>
							<li class="movements-list__item">
								<button
									type="button"
									class="movements-list__btn"
									data-activity="squat"
								>
									<span class="movements-list__title">Squats</span>
									<span class="movements-list__icon">
										<img src="./img/squats-icon.svg" alt="squats" />
									</span>
								</button>
							</li>

							<li class="movements-list__item">
								<button
									type="button"
									class="movements-list__btn"
									data-activity="muscleUp"
								>
									<span class="movements-list__title">Muscle ups</span>
									<span class="movements-list__icon">
										<img src="./img/squats-icon.svg" alt="muscleUp" />
									</span>
								</button>
							</li>
						</ul>
					</sidebar>

					<h1 class="header__caption caption">Workout Rep Counter</h1>

					<div class="navigation">
						<div class="login">login</div>
						<div class="statistic">statistic</div>
					</div>

					<button class="clear">Clear</button>
				</div>
			</header>

			<div class="main-page">
				<div class="container">
					<div class="main-section">
						<form
							class="form-counter"
							data-action="formCount"
							data-exercise="pullUp"
							data-default="pullUp"
							action=""
						>
							<div class="form-counter__control">
								<h2 class="form-counter__title" data-action="counterDisplay">
									Pull ups:
								</h2>
								<p class="form-counter__number">
									<span class="form-counter__display">0</span>
								</p>
							</div>

							<div class="form-counter__container">
								<button
									type="button"
									data-action="increaseValue"
									class="form-counter__btn"
								>
									+ 1
								</button>
								<input
									data-action="inputCount"
									class="form-counter__input"
									type="number"
									placeholder="0"
									name="field"
								/>
								<button
									type="button"
									data-action="decreaseValue"
									class="form-counter__btn"
								>
									- 1
								</button>
							</div>

							<button
								type="button"
								data-action="saveValue"
								class="form-counter__btn"
							>
								Save
							</button>
						</form>
					</div>
				</div>
			</div>

			<footer class="footer"></footer>
		</div>
		<script type="module" src="/index.js"></script>
	</body>
</html>
